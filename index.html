<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇趣导航 - 发现全球好玩网站</title>
    <!-- 引入 Tailwind CSS 构建现代样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Vue 3 处理数据渲染和交互 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 FontAwesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased" id="app">

<!-- 左侧边栏 (大屏显示) -->
<aside class="fixed inset-y-0 left-0 w-64 bg-white shadow-lg z-20 flex flex-col hidden md:flex">
    <div class="p-6 border-b border-gray-100 flex items-center gap-3">
        <i class="fa-solid fa-rocket text-indigo-500 text-2xl"></i>
        <h1 class="text-xl font-bold text-gray-800">奇趣导航</h1>
    </div>
    <nav class="flex-1 overflow-y-auto sidebar-scroll p-4 space-y-1">
        <a v-for="(category, index) in filteredCategories" :key="index" :href="'#cat-' + index"
           class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-gray-600 rounded-lg hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
            <i :class="category.icon + ' w-5 text-center'"></i>
            {{ category.name }}
            <span class="ml-auto bg-gray-100 text-gray-500 py-0.5 px-2 rounded-full text-xs">{{ category.sites.length }}</span>
        </a>
    </nav>
</aside>

<!-- 主内容区 -->
<main class="md:ml-64 min-h-screen flex flex-col">
    <!-- 顶部导航 & 搜索栏 -->
    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-10 px-8 py-4 flex justify-between items-center">
        <div class="text-gray-500 text-sm font-medium">收录自互联网的精选奇趣网站 (共 {{ totalSites }} 个)</div>
        <div class="relative">
            <input v-model="searchQuery" type="text" placeholder="搜索网站名称或描述..." 
                   class="pl-10 pr-4 py-2 border border-gray-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 w-64 transition-all bg-gray-50 focus:bg-white">
            <i class="fa-solid fa-search absolute left-4 top-2.5 text-gray-400 text-sm"></i>
        </div>
    </header>

    <!-- 卡片网格区 -->
    <div class="p-8 flex-1">
        <div v-if="filteredCategories.length === 0" class="text-center py-20 text-gray-400">
            <i class="fa-regular fa-face-frown text-4xl mb-4"></i>
            <p>没有找到相关网站，换个关键词试试吧~</p>
        </div>

        <div v-for="(category, index) in filteredCategories" :key="index" :id="'cat-' + index" class="mb-12 scroll-mt-24">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-gray-800">
                <i :class="category.icon + ' text-indigo-500'"></i>
                {{ category.name }}
            </h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- 网站卡片 -->
                <a v-for="site in category.sites" :key="site.name" :href="site.url" target="_blank" 
                   class="bg-white rounded-xl p-5 border border-gray-100 card-hover flex flex-col h-full cursor-pointer block group">
                    <div class="flex items-start gap-4 mb-3">
                        <img :src="'https://ui-avatars.com/api/?name='+site.name+'&background=random&color=fff'" alt="Logo" class="w-11 h-11 rounded-full object-cover shadow-sm group-hover:scale-105 transition-transform">
                        <div class="flex-1 min-w-0">
                            <h3 class="text-base font-bold text-gray-800 truncate group-hover:text-indigo-600 transition-colors" :title="site.name">{{ site.name }}</h3>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-xs bg-indigo-50 text-indigo-500 px-2 py-0.5 rounded">{{ category.name }}</span>
                                <span v-if="site.hot" class="text-xs text-orange-500 flex items-center gap-1"><i class="fa-solid fa-fire text-[10px]"></i> {{ site.hot }}</span>
                            </div>
                        </div>
                    </div>
                    <p class="text-sm text-gray-500 line-clamp-3 leading-relaxed flex-1" :title="site.desc">{{ site.desc }}</p>
                </a>
            </div>
        </div>
    </div>
</main>

        computed: {
            // 实时搜索过滤逻辑
            filteredCategories() {
                if (!this.searchQuery) return this.rawCategories;
                const query = this.searchQuery.toLowerCase();
                return this.rawCategories.map(cat => {
                    return {
                        ...cat,
                        sites: cat.sites.filter(site => 
                            site.name.toLowerCase().includes(query) || 
                            site.desc.toLowerCase().includes(query)
                        )
                    }
                }).filter(cat => cat.sites.length > 0);
            },
            totalSites() {
                return this.rawCategories.reduce((acc, curr) => acc + curr.sites.length, 0);
            }
        }
    }).mount('#app')
