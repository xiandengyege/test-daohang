<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X乐园 - 探索无限奇趣</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    html { scroll-behavior: smooth; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    body { background-color: #f0f4f8; overflow-x: hidden; }
    .blob { position: fixed; filter: blur(90px); z-index: -1; opacity: 0.6; animation: float 10s infinite ease-in-out alternate; }
    .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: #ffb6ff; }
    .blob-2 { bottom: -10%; right: -10%; width: 600px; height: 600px; background: #8aecff; animation-delay: 2s; }
    .blob-3 { top: 40%; left: 40%; width: 400px; height: 400px; background: #e0c3fc; animation-delay: 4s; }
    @keyframes float { 0%{transform:translate(0,0) scale(1);} 33%{transform:translate(30px,-50px) scale(1.1);} 66%{transform:translate(-20px,20px) scale(0.9);} 100%{transform:translate(0,0) scale(1);} }
    .glass-panel { background: rgba(255,255,255,0.45); backdrop-filter: blur(16px); border:1px solid rgba(255,255,255,0.6); box-shadow:0 8px 32px rgba(31,38,135,0.05); }
    .glass-card { background: rgba(255,255,255,0.4); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.5); box-shadow:0 4px 24px rgba(0,0,0,0.04); transition: all 0.3s; }
    .glass-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.9); box-shadow:0 12px 32px rgba(0,0,0,0.08); }
    .search-header { position: sticky; top: 1rem; z-index: 40; }
    .sub-nav-sticky { position: sticky; top: 6.3rem; z-index: 30; background: rgba(255,255,255,0.75); backdrop-filter: blur(12px); border-bottom:1px solid rgba(0,0,0,0.05); margin-bottom:1.5rem; }
    .site-icon-circle { width: 2rem; height: 2rem; font-size: 0.75rem; }
  </style>
</head>
<body id="app">
<div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>

<!-- 左侧分类导航（紧凑版） -->
<aside class="fixed inset-y-0 left-4 top-4 bottom-4 w-56 glass-panel rounded-3xl z-50 flex flex-col hidden md:flex overflow-hidden">
  <div class="p-6 flex items-center gap-2">
    <i class="fa-regular fa-circle-dot text-2xl bg-gradient-to-tr from-violet-500 to-fuchsia-500 text-transparent bg-clip-text inline-block"></i>
    <h1 class="text-xl font-black bg-gradient-to-r from-violet-600 to-fuchsia-600 text-transparent bg-clip-text">X 乐园</h1>
  </div>
  <nav class="flex-1 overflow-y-auto px-3 pb-6 space-y-1">
    <a v-for="(cat, idx) in rawCategories" :key="idx" :href="'#cat-' + idx"
       class="flex items-center gap-2 px-3 py-1.5 text-xs font-medium text-gray-600 rounded-xl hover:bg-white/60 hover:text-gray-900 transition group">
      <i :class="cat.icon + ' text-xs w-4 h-4 flex items-center justify-center'" style="color: var(--cat-color)" :style="{ color: getCatColor(cat) }"></i>
      <span class="truncate flex-1">{{ cat.name }}</span>
      <span class="bg-white/80 text-gray-500 py-0.5 px-1.5 rounded-full text-xs tabular-nums">
        {{ cat.subcategories.reduce((a,s)=>a+s.sites.length,0) }}
      </span>
    </a>
  </nav>
</aside>

<main class="md:ml-[15rem] min-h-screen flex flex-col p-4">
  <!-- 顶部搜索栏 -->
  <header class="search-header glass-panel rounded-3xl px-6 py-3 flex items-center justify-center mb-6">
    <div class="relative w-64 md:w-96">
      <input v-model="searchQuery" type="text" placeholder="探索 X 乐园..."
             class="w-full pl-10 pr-4 py-2 glass-panel rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-violet-300">
      <i class="fa-regular fa-magnifying-glass absolute left-3 top-2.5 text-gray-400 text-sm"></i>
    </div>
  </header>

  <!-- 站点区域 -->
  <div class="flex-1">
    <div v-if="rawCategories.length===0" class="text-center py-32 text-gray-400">
      <i class="fa-regular fa-face-frown text-6xl mb-6 opacity-50"></i>
      <p>数据加载失败</p>
    </div>

    <div v-for="(cat, catIdx) in rawCategories" :key="catIdx" :id="'cat-'+catIdx" class="mb-16 scroll-mt-28">
      <h2 class="text-2xl font-extrabold mb-4 flex items-center gap-3 text-gray-800 ml-2">
        <span :class="['w-2 h-8 rounded-full', cat.gradient]"></span>
        <span class="bg-clip-text text-transparent" :class="cat.gradient">{{ cat.name }}</span>
      </h2>

      <div class="sub-nav-sticky overflow-x-auto flex gap-2 py-2 px-1">
        <button @click="selectSub(catIdx, -1)" :class="[(activeSubMap[catIdx]??-1)===-1 ? 'bg-violet-500 text-white' : 'bg-white/60']" class="px-4 py-2 text-sm font-medium rounded-full whitespace-nowrap transition">全部</button>
        <button v-for="(sub, si) in cat.subcategories" :key="si" @click="selectSub(catIdx, si)" :class="[(activeSubMap[catIdx]??-1)===si ? 'bg-violet-500 text-white' : 'bg-white/60']" class="px-4 py-2 text-sm font-medium rounded-full whitespace-nowrap transition">{{ sub.name }}</button>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-7 gap-4 mt-6">
        <a v-for="site in currentSubItemsFiltered(catIdx)" :key="site.url" :href="site.url" target="_blank"
           class="glass-card rounded-2xl p-4 flex flex-col group" :title="site.desc || ''">
          <div class="flex items-center gap-2 mb-2">
            <div class="site-icon-circle rounded-full flex items-center justify-center font-bold text-white"
                 :style="{ backgroundColor: getColorFromName(site.name) }">
              {{ getInitial(site.name) }}
            </div>
            <h3 class="text-sm font-bold text-gray-800 truncate group-hover:text-violet-600 flex-1">{{ site.name }}</h3>
          </div>
          <p class="text-xs text-gray-500 line-clamp-2 leading-relaxed flex-1" :title="site.desc">{{ site.desc }}</p>
        </a>
      </div>
    </div>
  </div>
</main>

<script src="data.js"></script>
<script>
  const { createApp } = Vue;
  createApp({
    data() {
      return {
        rawCategories: [],
        activeSubMap: {},
        searchQuery: ''
      }
    },
    methods: {
      getInitial(name) { return name.charAt(0).toUpperCase(); },
      getColorFromName(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
          hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }
        return `hsl(${hash % 360}, 65%, 55%)`;
      },
      selectSub(catIdx, subIdx) { this.activeSubMap[catIdx] = subIdx; },
      currentSubItemsFiltered(catIdx) {
        const cat = this.rawCategories[catIdx];
        if (!cat) return [];
        const sel = this.activeSubMap[catIdx] ?? -1;
        let sites = [];
        if (sel === -1) {
          sites = cat.subcategories.reduce((arr, s) => arr.concat(s.sites || []), []);
        } else {
          sites = cat.subcategories[sel]?.sites || [];
        }
        if (!this.searchQuery) return sites;
        const q = this.searchQuery.toLowerCase();
        return sites.filter(site => site.name.toLowerCase().includes(q) || (site.desc && site.desc.toLowerCase().includes(q)));
      },
      // 从渐变类中提取一个代表色用于图标（简单取第一个颜色）
      getCatColor(cat) {
        // 例如 bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500
        const match = cat.gradient.match(/from-([a-z]+-\d+)/);
        if (match) {
          const color = match[1]; // pink-500
          const map = {
            'pink-500': '#ec4899',
            'red-500': '#ef4444',
            'yellow-500': '#eab308',
            'blue-600': '#2563eb',
            'indigo-500': '#6366f1',
            'purple-600': '#9333ea',
            'teal-400': '#2dd4bf',
            'emerald-500': '#10b981',
            'green-500': '#22c55e',
            'rose-400': '#fb7185',
            'orange-400': '#fb923c',
            'cyan-500': '#06b6d4',
            'slate-600': '#475569',
            'gray-700': '#374151',
            'zinc-800': '#27272a',
            'lime-400': '#a3e635',
            'fuchsia-500': '#d946ef',
            'purple-500': '#a855f7',
            'violet-600': '#7c3aed',
            // 可自行补充更多
          };
          if (map[color]) return map[color];
        }
        return '#6366f1'; // 默认 indigo-500
      }
    },
    mounted() {
      if (typeof SITE_DATA !== 'undefined') {
        // 重新排序：将“学习科普”“极客代码”“创意设计”提前
        const priorityNames = ['📚 学习科普', '💻 极客代码', '🎨 创意设计'];
        let sorted = [];
        const remaining = [];
        const cats = [...SITE_DATA];
        // 先按顺序提取优先分类
        priorityNames.forEach(name => {
          const idx = cats.findIndex(c => c.name === name);
          if (idx !== -1) {
            sorted.push(cats[idx]);
            cats.splice(idx, 1);
          }
        });
        this.rawCategories = sorted.concat(cats);
        // 初始化子分类选择
        this.rawCategories.forEach((_, idx) => { this.activeSubMap[idx] = -1; });
      }
    }
  }).mount('#app');
</script>
</body>
</html>
